<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Peel WASM Runtime</title>
    <style>
      body {
        font-family: "Segoe UI", Roboto, sans-serif;
        background-color: #0d1117;
        color: #c9d1d9;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }

      .container {
        text-align: center;
        padding: 2rem;
        border: 1px solid #30363d;
        border-radius: 8px;
        background-color: #161b22;
      }

      button {
        padding: 12px 24px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        border-radius: 6px;
        border: 1px solid rgba(240, 246, 252, 0.1);
        background-color: #238636;
        color: #ffffff;
        transition: background-color 0.2s;
      }

      button:disabled {
        background-color: #213322;
        color: #8b949e;
        cursor: not-allowed;
      }

      button:hover:not(:disabled) {
        background-color: #2ea043;
      }

      #status {
        margin-top: 20px;
        color: #8b949e;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Peel Interpreter</h1>
      <script src="./run.js"></script>
      <script>
        if (!WebAssembly.instantiateStreaming) {
          WebAssembly.instantiateStreaming = async (resp, importObject) => {
            const source = await (await resp).arrayBuffer();
            return await WebAssembly.instantiate(source, importObject);
          };
        }

        const peel = new Peel();
        let mod;

        WebAssembly.instantiateStreaming(fetch("peel.wasm"), peel.importObject)
          .then((result) => {
            mod = result.module;
            document.getElementById("runButton").disabled = false;
            document.getElementById("status").innerText = "Engine Ready";
          })
          .catch((err) => {
            document.getElementById("status").innerText = "Load Failed";
            console.error(err);
          });

        async function run() {
          const btn = document.getElementById("runButton");
          const status = document.getElementById("status");
          console.clear();
          btn.disabled = true;
          status.innerText = "Executing";
          try {
            const inst = await WebAssembly.instantiate(mod, peel.importObject);
            await peel.run(inst);
            status.innerText = "Finished";
          } catch (err) {
            status.innerText = "Error";
            console.error(err);
          } finally {
            btn.disabled = false;
          }
        }
      </script>
      <button onClick="run();" id="runButton" disabled>Run Peel</button>
      <div id="status">Initializing</div>
    </div>
  </body>
</html>
