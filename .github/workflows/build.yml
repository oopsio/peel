name: Multi-Platform Build

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux Targets ---
          - os: linux
            arch: x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: linux
            arch: x86
            runner: ubuntu-latest
            target: i686-unknown-linux-gnu
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu

          # --- macOS (Darwin) Targets ---
          - os: darwin
            arch: x64
            runner: macos-13
            target: x86_64-apple-darwin
          - os: darwin
            arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin

          # --- Windows Targets ---
          - os: win32
            arch: x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - os: win32
            arch: ia32
            runner: windows-latest
            target: i686-pc-windows-msvc

          # --- FreeBSD Targets (Uses Cross-Compilation) ---
          - os: freebsd
            arch: x64
            runner: ubuntu-latest
            target: x86_64-unknown-freebsd
          - os: freebsd
            arch: arm64
            runner: ubuntu-latest
            target: aarch64-unknown-freebsd

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross (Linux/FreeBSD)
        if: runner.os == 'Linux'
        run: cargo install cross --git https://github.com/cross-rs/cross.git

      - name: Build Binary
        shell: bash
        run: |
          # Use 'cross' on Linux for architecture/OS isolation
          # We force 'openssl/vendored' to fix the missing libssl-dev errors
          if [ "${{ runner.os }}" = "Linux" ]; then
            cross build --release --target ${{ matrix.target }} --features openssl/vendored
          else
            # On MacOS/Windows we use standard cargo with vendored features
            cargo build --release --target ${{ matrix.target }} --features openssl/vendored
          fi

      - name: Prepare Artifact
        shell: bash
        run: |
          # Replace 'peel' with your actual binary name if different
          BINARY_NAME="peel"
          EXTENSION=""
          if [[ "${{ matrix.os }}" == "win32" ]]; then EXTENSION=".exe"; fi

          # Rust puts cross-compiled binaries in target/<triple>/release/
          SRC_PATH="target/${{ matrix.target }}/release/${BINARY_NAME}${EXTENSION}"
          DEST_NAME="${BINARY_NAME}-${{ matrix.os }}-${{ matrix.arch }}${EXTENSION}"

          echo "Moving $SRC_PATH to $DEST_NAME"
          mv "$SRC_PATH" "$DEST_NAME"
          echo "FINAL_BINARY=$DEST_NAME" >> $GITHUB_ENV

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FINAL_BINARY }}
          path: ${{ env.FINAL_BINARY }}
          if-no-files-found: error
